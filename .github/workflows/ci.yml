name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Відміняє попередні запуски, якщо ти запушив нові коміти в той самий PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Run Unit Tests (Vitest)
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Production Build Check
    runs-on: ubuntu-latest
    needs: validate # Чекаємо поки пройдуть тести і лінтер

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Генеруємо ключ кешу на основі ОС, Node, і хешів файлів залежностей
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        # Додаємо фейкові змінні оточення, якщо Next.js вимагає їх під час збірки сторінок
        env:
          AUTH_SECRET: "ci_dummy_secret_for_build_only_123456789"
          DATABASE_URL: "postgres://user:pass@localhost:5432/db"
          GOOGLE_CLIENT_ID: "ci_dummy_google_client_id"
          GOOGLE_CLIENT_SECRET: "ci_dummy_google_client_secret"
          NEXT_PUBLIC_API_URL: "http://localhost:3000"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  db-migrations:
    name: Test DB Migrations
    runs-on: ubuntu-latest
    # Runs in parallel with validate — DB check is independent of linting/tests

    services:
      postgres:
        image: postgres:16 # Match the project's PostgreSQL version
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run SQL migrations (001_create_users)
        # db-migrate.ts reads .sql files — must run first; 002+ depend on it
        run: npm run db:migrate
        env:
          DATABASE_URL: "postgres://testuser:testpassword@localhost:5432/testdb"

      - name: Run Kysely migrations (002_auth_tables, 003_expense_tables)
        # kysely-migrate.ts runs TS migrations that depend on the SQL above
        run: npm run db:migrate:kysely
        env:
          DATABASE_URL: "postgres://testuser:testpassword@localhost:5432/testdb"
