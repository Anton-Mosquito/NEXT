name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Відміняє попередні запуски, якщо ти запушив нові коміти в той самий PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Run Unit Tests (Vitest)
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Production Build Check
    runs-on: ubuntu-latest
    needs: validate # Чекаємо поки пройдуть тести і лінтер

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Генеруємо ключ кешу на основі ОС, Node, і хешів файлів залежностей
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        # Додаємо фейкові змінні оточення, якщо Next.js вимагає їх під час збірки сторінок
        env:
          AUTH_SECRET: "ci_dummy_secret_for_build_only_123456789"
          DATABASE_URL: "postgres://user:pass@localhost:5432/db"
          GOOGLE_CLIENT_ID: "ci_dummy_google_client_id"
          GOOGLE_CLIENT_SECRET: "ci_dummy_google_client_secret"
          NEXT_PUBLIC_API_URL: "http://localhost:3000"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
