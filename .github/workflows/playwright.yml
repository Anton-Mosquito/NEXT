name: Playwright E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel stale runs on new commits to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Migrate DB and build app
        uses: ./.github/actions/build-app
        with:
          database-url: "postgres://testuser:testpassword@localhost:5432/testdb"

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          # Increase Node heap for the test runner process
          NODE_OPTIONS: "--max-old-space-size=4096"
          AUTH_SECRET: "ci_dummy_secret_for_build_only_123456789"
          DATABASE_URL: "postgres://testuser:testpassword@localhost:5432/testdb"
          GOOGLE_CLIENT_ID: "ci_dummy_google_client_id"
          GOOGLE_CLIENT_SECRET: "ci_dummy_google_client_secret"
          NEXT_PUBLIC_API_URL: "http://localhost:3000"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
